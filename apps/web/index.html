<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusClaw — Your framework. Your rules.</title>
<style>
/* === RESET & VARS === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000;
  --sidebar-bg: #111;
  --sidebar-border: #1a1a1a;
  --surface: #161616;
  --surface-hover: #1e1e1e;
  --border: #2a2a2a;
  --text: #fff;
  --text-2: #888;
  --text-3: #555;
  --accent: #7c3aed;
  --accent-light: #a78bfa;
  --accent-dim: rgba(124, 58, 237, 0.12);
  --radius: 10px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --sidebar-w: 260px;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
}

/* === SIDEBAR === */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--sidebar-border);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--sidebar-border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-logo {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  flex: 1;
}

.sidebar-logo span {
  font-size: 11px;
  display: block;
  font-weight: 400;
  -webkit-text-fill-color: var(--text-3);
  letter-spacing: 0.5px;
}

.new-chat-btn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--accent);
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}

.new-chat-btn:hover { background: var(--accent-light); }

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.session-list::-webkit-scrollbar { width: 4px; }
.session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.session-item {
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 2px;
  transition: background 0.1s, color 0.1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.session-item:hover { background: var(--surface-hover); color: var(--text); }
.session-item.active { background: var(--accent-dim); color: var(--accent-light); }
.session-item .s-icon { font-size: 15px; flex-shrink: 0; }
.session-item .s-title { overflow: hidden; text-overflow: ellipsis; }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--sidebar-border);
  display: flex;
  gap: 8px;
}

.sidebar-btn {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: all 0.15s;
}

.sidebar-btn:hover { background: var(--surface-hover); color: var(--text); }

/* === MAIN CONTENT === */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

/* === TOPBAR === */
.topbar {
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 56px;
}

.chat-title {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  border: none;
  background: transparent;
  outline: none;
  font-family: var(--font);
}

.chat-title::placeholder { color: var(--text-3); }

.topbar-actions {
  display: flex;
  gap: 6px;
}

.icon-btn {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-2);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.icon-btn:hover { background: var(--surface); color: var(--text); border-color: var(--text-3); }

/* === MESSAGES === */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.msg {
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  animation: msgIn 0.2s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user { display: flex; justify-content: flex-end; }
.msg.assistant { display: flex; justify-content: flex-start; }

.bubble {
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.65;
  word-break: break-word;
}

.msg.user .bubble {
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 4px;
  max-width: 85%;
}

.msg.assistant .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.msg.assistant .bubble p { margin-bottom: 10px; }
.msg.assistant .bubble p:last-child { margin-bottom: 0; }
.msg.assistant .bubble strong { color: var(--text); }
.msg.assistant .bubble em { color: var(--text-2); }
.msg.assistant .bubble a { color: var(--accent-light); }

.msg.assistant .bubble pre {
  background: #000;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin: 10px 0;
  overflow-x: auto;
  font-size: 13px;
  line-height: 1.5;
}

.msg.assistant .bubble code {
  background: rgba(255,255,255,0.07);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
}

.msg.assistant .bubble pre code {
  background: none;
  padding: 0;
}

.msg .meta {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 6px;
  padding: 0 4px;
}

.msg.user .meta { text-align: right; }

/* === WELCOME === */
.welcome {
  max-width: 640px;
  margin: 0 auto;
  padding: 40px 24px;
  text-align: center;
}

.welcome-logo {
  font-size: 48px;
  margin-bottom: 8px;
}

.welcome h1 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff, #888);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.welcome p {
  color: var(--text-2);
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 24px;
}

.quick-actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 32px;
}

.quick-btn {
  padding: 8px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-2);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}

.quick-btn:hover { background: var(--surface-hover); color: var(--text); border-color: var(--text-3); }

.models-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 32px;
}

.model-chip {
  padding: 6px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  color: var(--text-3);
  cursor: pointer;
  transition: all 0.15s;
}

.model-chip:hover, .model-chip.selected {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent-light);
}

.status-row {
  display: flex;
  gap: 20px;
  justify-content: center;
  font-size: 12px;
  color: var(--text-3);
}

.status-item {
  display: flex;
  align-items: center;
  gap: 5px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.dot-green { background: #22c55e; }
.dot-yellow { background: #eab308; }
.dot-red { background: #ef4444; }
.dot-grey { background: var(--text-3); }

/* === INPUT === */
.input-area {
  padding: 16px 24px 20px;
  border-top: 1px solid var(--border);
}

.input-wrapper {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px 8px 8px 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-wrapper:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

#input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  resize: none;
  max-height: 160px;
  outline: none;
  line-height: 1.5;
  padding: 6px 0;
}

#input::placeholder { color: var(--text-3); }

.send-btn {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: var(--accent);
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}

.send-btn:hover:not(:disabled) { background: var(--accent-light); transform: scale(1.05); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.input-hint {
  text-align: center;
  font-size: 11px;
  color: var(--text-3);
  margin-top: 8px;
  max-width: 720px;
  margin-left: auto;
  margin-right: auto;
}

/* === LOADING === */
.loading-msg {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-3);
  font-size: 13px;
  padding: 8px 0;
}

.loading-dots { display: flex; gap: 4px; }
.loading-dots span {
  width: 6px;
  height: 6px;
  background: var(--text-3);
  border-radius: 50%;
  animation: dotPulse 1.4s infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* === SETTINGS PANEL === */
.panel-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.panel-overlay.open { opacity: 1; pointer-events: all; }

.panel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 320px;
  background: var(--sidebar-bg);
  border-left: 1px solid var(--border);
  z-index: 101;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel.open { transform: translateX(0); }

.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.panel-header h2 { font-size: 15px; font-weight: 600; }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.setting {
  margin-bottom: 24px;
}

.setting label {
  display: block;
  font-size: 11px;
  color: var(--text-3);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.setting select,
.setting input[type="text"],
.setting input[type="number"] {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.2s;
}

.setting select:focus,
.setting input:focus { border-color: var(--accent); }
.setting select option { background: var(--surface); }

/* Mobile */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  .sidebar { display: none; }
  .msg { max-width: 100%; }
  .bubble { font-size: 15px; }
  .topbar { padding: 10px 16px; }
  .messages { padding: 14px 16px; }
  .input-area { padding: 12px 16px 16px; }
  .panel { width: 100%; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      ⚡ NexusClaw
      <span>YOUR FRAMEWORK</span>
    </div>
    <button class="new-chat-btn" onclick="newChat()" title="New chat">+</button>
  </div>
  <div class="session-list" id="sessionList"></div>
  <div class="sidebar-footer">
    <button class="sidebar-btn" onclick="toggleSettings()">⚙️ Settings</button>
    <button class="sidebar-btn" onclick="showStatus()">📊 Status</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <input class="chat-title" id="chatTitle" value="New conversation" placeholder="Conversation name..." onchange="saveTitle()" />
    <div class="topbar-actions">
      <button class="icon-btn" onclick="toggleSettings()" title="Settings">⚙️</button>
      <button class="icon-btn" onclick="newChat()" title="New chat">✕</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <!-- Welcome screen -->
    <div class="welcome">
      <div class="welcome-logo">⚡</div>
      <h1>NexusClaw</h1>
      <p>Your framework. Your rules.<br>Configure your AI and start building.</p>
      <div class="quick-actions">
        <button class="quick-btn" onclick="quickPrompt('Write a Python function that...')">Write code</button>
        <button class="quick-btn" onclick="quickPrompt('Explain this concept:')">Explain something</button>
        <button class="quick-btn" onclick="quickPrompt('Research:')">Research topic</button>
        <button class="quick-btn" onclick="quickPrompt('Debug this code:')">Debug code</button>
      </div>
      <div class="models-row" id="modelRow"></div>
      <div class="status-row">
        <div class="status-item"><span class="status-dot dot-grey" id="apiDot"></span><span id="apiStatus">Checking API...</span></div>
        <div class="status-item"><span class="status-dot dot-grey" id="ollamaDot"></span><span id="ollamaStatus">Ollama...</span></div>
        <div class="status-item" id="modelStatusItem"><span id="modelStatus">—</span></div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="input" rows="1" placeholder="Message NexusClaw..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
    <div class="input-hint">NexusClaw · Press Enter to send · Shift+Enter for new line · Ctrl+M for voice</div>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div class="panel-overlay" id="panelOverlay" onclick="toggleSettings()"></div>
<div class="panel" id="settingsPanel">
  <div class="panel-header">
    <h2>⚙️ Settings</h2>
    <button class="icon-btn" onclick="toggleSettings()">✕</button>
  </div>
  <div class="panel-body">
    <div class="setting">
      <label>AI Provider</label>
      <select id="selProvider" onchange="saveSettings()">
        <option value="ollama">🤖 Ollama (local, free)</option>
        <option value="openai">✨ OpenAI (GPT-4o)</option>
        <option value="anthropic">🧠 Anthropic (Claude)</option>
        <option value="minimaxi">⚡ Minimaxi (fast, cheap)</option>
        <option value="openrouter">🌐 OpenRouter (100+ models)</option>
      </select>
    </div>
    <div class="setting">
      <label>Model</label>
      <input type="text" id="selModel" value="llama3.2" placeholder="e.g. llama3.2, gpt-4o" onchange="saveSettings()" />
    </div>
    <div class="setting">
      <label>Soul / Persona</label>
      <select id="selSoul" onchange="saveSettings()">
        <option value="">Default</option>
        <option value="blank">Blank — pure assistant</option>
        <option value="assistant">Assistant — helpful & friendly</option>
        <option value="coder">Coder — programming expert</option>
        <option value="researcher">Researcher — deep analysis</option>
      </select>
    </div>
    <div class="setting">
      <label>Temperature — <span id="tempVal">0.7</span></label>
      <input type="range" id="selTemp" min="0" max="2" step="0.1" value="0.7" oninput="document.getElementById('tempVal').textContent=this.value; saveSettings()" />
    </div>
    <div class="setting">
      <label>Max Tokens</label>
      <input type="number" id="selMaxTokens" value="4096" min="256" max="8192" step="256" onchange="saveSettings()" />
    </div>
    <div class="setting">
      <label>🤖 Machine Access</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
        <button class="icon-btn" onclick="lsDir()" title="Browse files" style="width:auto;padding:0 10px;font-size:12px">📁 LS</button>
        <button class="icon-btn" onclick="runShell()" title="Shell" style="width:auto;padding:0 10px;font-size:12px">⌨ Shell</button>
        <button class="icon-btn" onclick="sysInfo()" title="System" style="width:auto;padding:0 10px;font-size:12px">💻 Sys</button>
      </div>
    </div>
    <div class="setting">
      <label>🌐 Browser</label>
      <div style="display:flex;gap:6px;margin-top:6px">
        <input type="text" id="browserUrl" placeholder="https://..." style="flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:13px">
        <button class="icon-btn" onclick="browserNav()" style="width:auto;padding:0 10px;font-size:12px">→</button>
        <button class="icon-btn" onclick="browserShot()" style="width:auto;padding:0 10px;font-size:12px">📸</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8080';
let sessionId = localStorage.getItem('nexus_session') || 'main_' + Date.now().toString(36);
let ws = null;
let streaming = false;
let currentModel = 'ollama';
let settings = JSON.parse(localStorage.getItem('nexus_settings') || '{}');

function loadSettings() {
  if (!settings.provider) settings = {provider: 'ollama', model: 'llama3.2', soul: '', temp: 0.7, maxTokens: 4096};
  document.getElementById('selProvider').value = settings.provider;
  document.getElementById('selModel').value = settings.model || 'llama3.2';
  document.getElementById('selSoul').value = settings.soul || '';
  document.getElementById('selTemp').value = settings.temp || 0.7;
  document.getElementById('tempVal').textContent = settings.temp || 0.7;
  document.getElementById('selMaxTokens').value = settings.maxTokens || 4096;
  document.getElementById('modelStatus').textContent = settings.provider + '/' + settings.model;
  currentModel = settings.provider;
}

function saveSettings() {
  settings.provider = document.getElementById('selProvider').value;
  settings.model = document.getElementById('selModel').value;
  settings.soul = document.getElementById('selSoul').value;
  settings.temp = parseFloat(document.getElementById('selTemp').value);
  settings.maxTokens = parseInt(document.getElementById('selMaxTokens').value);
  localStorage.setItem('nexus_settings', JSON.stringify(settings));
  document.getElementById('modelStatus').textContent = settings.provider + '/' + settings.model;
  currentModel = settings.provider;
}

loadSettings();

// ─── WEBSOCKET ────────────────────────────────────────────────
function connectWS() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket(`ws://${location.host}/ws/${sessionId}`);
  ws.onopen = () => setStatus('api', 'online', 'green');
  ws.onclose = () => { setStatus('api', 'reconnecting...', 'yellow'); setTimeout(connectWS, 3000); };
  ws.onerror = () => setStatus('api', 'error', 'red');
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'chunk') {
      streaming = true;
      const last = document.querySelector('.msg.assistant:last-child .bubble');
      if (last) last.innerHTML += formatContent(d.content);
      scrollBottom();
    } else if (d.type === 'done') {
      streaming = false;
      document.getElementById('sendBtn').disabled = false;
    } else if (d.type === 'error') {
      const last = document.querySelector('.msg.assistant:last-child .bubble');
      if (last) last.innerHTML = `<p style="color:#ef4444">Error: ${d.content}</p>`;
      document.getElementById('sendBtn').disabled = false;
      streaming = false;
    }
  };
}

// ─── CHAT ──────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg || streaming) return;
  
  hideWelcome();
  
  addMsg('user', msg);
  input.value = '';
  input.style.height = 'auto';
  
  document.getElementById('sendBtn').disabled = true;
  
  // Empty assistant msg
  const aid = addMsg('assistant', '<div class="loading-msg"><div class="loading-dots"><span></span><span></span><span></span></div>Thinking...</div>');
  
  scrollBottom();
  
  if (!ws || ws.readyState > 1) connectWS();
  
  if (ws.readyState === 1) {
    ws.send(JSON.stringify({
      type: 'chat', content: msg,
      provider: settings.provider, model: settings.model,
      soul: settings.soul, temperature: settings.temp,
      maxTokens: settings.maxTokens
    }));
  } else {
    await httpStream(msg, aid);
  }
}

async function httpStream(message, aid) {
  try {
    const resp = await fetch(`${API}/v1/chat/answer/stream`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sessionId, message, provider: settings.provider, model: settings.model})
    });
    
    if (!resp.ok) {
      setBubble(aid, `<p style="color:#ef4444">API error ${resp.status}. Is the API running?</p>`);
      return;
    }
    
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      const text = decoder.decode(value, {stream: true});
      for (const line of text.split('\n')) {
        if (line.startsWith('data: ')) {
          try {
            const d = JSON.parse(line.slice(6));
            if (d.type === 'chunk') {
              full += d.content;
              setBubble(aid, formatContent(full));
              scrollBottom();
            }
          } catch {}
        }
      }
    }
  } catch(e) {
    setBubble(aid, `<p style="color:#ef4444">Connection failed: ${e.message}</p><p style="color:#888;font-size:12px;margin-top:8px">Start API: <code style="background:rgba(255,255,255,.07);padding:2px 6px;border-radius:4px">python3 apps/api/main.py</code></p>`);
  }
  
  document.getElementById('sendBtn').disabled = false;
  streaming = false;
}

function addMsg(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="bubble">${content}</div><div class="meta">${role === 'user' ? 'You' : 'NexusClaw'} · just now</div>`;
  document.getElementById('messages').appendChild(div);
  scrollBottom();
  return div;
}

function setBubble(el, html) {
  el.querySelector('.bubble').innerHTML = html;
}

function hideWelcome() {
  const w = document.querySelector('.welcome');
  if (w) w.style.display = 'none';
}

function formatContent(text) {
  let h = escapeHtml(text);
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => `<pre><code class="lang-${l}">${c.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`);
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/\n/g, '<br>');
  return h;
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function newChat() {
  document.getElementById('messages').innerHTML = document.querySelector('.welcome').outerHTML;
  document.querySelector('.welcome').style.display = 'block';
  sessionId = 'main_' + Date.now().toString(36);
  localStorage.setItem('nexus_session', sessionId);
  document.getElementById('chatTitle').value = 'New conversation';
  connectWS();
}

function saveTitle() {
  localStorage.setItem('nexus_title_' + sessionId, document.getElementById('chatTitle').value);
}

function quickPrompt(text) {
  document.getElementById('input').value = text;
  document.getElementById('input').focus();
}

// ─── STATUS ────────────────────────────────────────────────────
function setStatus(which, text, color) {
  const dot = document.getElementById(which + 'Dot');
  const txt = document.getElementById(which + 'Status');
  if (dot) dot.className = 'status-dot dot-' + color;
  if (txt) txt.textContent = text;
}

async function checkStatus() {
  try {
    const r = await fetch(`${API}/health`, {signal: AbortSignal.timeout(3000)});
    if (r.ok) setStatus('api', 'API online', 'green'); else setStatus('api', `error ${r.status}`, 'red');
  } catch { setStatus('api', 'offline', 'red'); }
  
  try {
    const r = await fetch('http://localhost:11434/api/tags', {signal: AbortSignal.timeout(3000)});
    if (r.ok) {
      const d = await r.json();
      setStatus('ollama', `${d.models.length} models`, 'green');
      // Update model chips
      const row = document.getElementById('modelRow');
      row.innerHTML = d.models.slice(0, 6).map(m => 
        `<button class="model-chip${m.name === settings.model ? ' selected' : ''}" onclick="selectModel('ollama','${m.name}')">${m.name.split(':')[0]}</button>`
      ).join('');
    } else setStatus('ollama', 'error', 'red');
  } catch { setStatus('ollama', 'offline', 'red'); }
}

function selectModel(provider, model) {
  settings.provider = provider;
  settings.model = model;
  saveSettings();
  document.querySelectorAll('.model-chip').forEach(b => b.classList.remove('selected'));
  event.target.classList.add('selected');
}

// ─── SETTINGS PANEL ───────────────────────────────────────────
function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const overlay = document.getElementById('panelOverlay');
  panel.classList.toggle('open');
  overlay.classList.toggle('open');
}

function showStatus() {
  checkStatus();
  alert('Status checked — see the dots in the welcome screen');
}

// ─── MACHINE ───────────────────────────────────────────────────
async function lsDir() {
  const path = prompt('Directory path:', '/home/greench');
  if (!path) return;
  try {
    const resp = await fetch(`${API}/v1/tools/ls?path=${encodeURIComponent(path)}`);
    const d = await resp.json();
    if (d.error) { alert(d.error); return; }
    const items = (d.items || []).slice(0, 50);
    alert(`${d.path}\n\n${items.map(i => `${i.type === 'dir' ? '📁' : '📄'} ${i.name}`).join('\n')}${d.items?.length > 50 ? '\n...and ' + (d.items.length - 50) + ' more' : ''}`);
  } catch(e) { alert('Error: ' + e.message); }
}

async function runShell() {
  const cmd = prompt('Shell command:');
  if (!cmd) return;
  try {
    const resp = await fetch(`${API}/v1/tools/shell?command=${encodeURIComponent(cmd)}`, {method:'POST'});
    const d = await resp.json();
    alert('stdout:\n' + (d.stdout || '(empty)') + '\n\nstderr:\n' + (d.stderr || '(empty)') + '\n\nexit: ' + d.returncode);
  } catch(e) { alert('Error: ' + e.message); }
}

async function sysInfo() {
  try {
    const resp = await fetch(`${API}/v1/tools/system`, {method:'POST'});
    const d = await resp.json();
    const s = d.system || {};
    alert(`OS: ${s.os}\nHost: ${s.hostname}\nCPU: ${s.cpu_percent}% (${s.cpu_count} cores)\nRAM: ${s.memory_used_gb}GB / ${s.memory_total_gb}GB (${s.memory_percent}%)\nDisk: ${s.disk_percent}%`);
  } catch(e) { alert('Error: ' + e.message); }
}

async function browserNav() {
  const url = document.getElementById('browserUrl')?.value;
  if (!url) return;
  try {
    const resp = await fetch(`${API}/v1/tools/browser/navigate?url=${encodeURIComponent(url)}`, {method:'POST'});
    const d = await resp.json();
    alert(d.ok ? `Loaded: ${d.title || url}` : 'Error: ' + (d.error || 'failed'));
  } catch(e) { alert('Error: ' + e.message); }
}

async function browserShot() {
  try {
    const resp = await fetch(`${API}/v1/tools/browser/screenshot`, {method:'POST'});
    const d = await resp.json();
    alert(d.ok ? `Screenshot: ${d.path}` : 'Error: ' + (d.error || 'failed'));
  } catch(e) { alert('Error: ' + e.message); }
}

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const sr = new SR();
  sr.lang = 'en-US';
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'm') { e.preventDefault(); sr.start(); }
  });
  sr.onresult = ev => { document.getElementById('input').value = ev.results[0][0].transcript; };
}
