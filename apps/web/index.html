<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusClaw — OpenRoom</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e14; --sidebar: #0d1117; --border: #21262d;
      --text: #e6edf3; --muted: #7d8590; --accent: #58a6ff;
      --user-bg: #1f6feb; --nexus-bg: #161b22; --success: #3fb950;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; }
    
    #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    #sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
    #sidebar-header h1 { font-size: 18px; color: var(--accent); font-weight: 700; letter-spacing: -0.5px; }
    #sidebar-header p { font-size: 11px; color: var(--muted); margin-top: 4px; }
    #new-chat-btn { margin: 12px; padding: 10px; background: var(--accent); color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
    #new-chat-btn:hover { opacity: 0.9; }
    #sessions-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; font-size: 13px; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
    .session-item:hover { background: var(--border); color: var(--text); }
    .session-item.active { background: var(--border); color: var(--accent); }
    .session-item .delete-btn { opacity: 0; font-size: 11px; color: #f85149; padding: 2px 6px; border-radius: 4px; }
    .session-item:hover .delete-btn { opacity: 1; }
    .session-item .delete-btn:hover { background: rgba(248,81,73,0.2); }
    
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    
    #header { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; font-size: 12px; background: var(--sidebar); }
    #header select { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    #header select:focus { outline: none; border-color: var(--accent); }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    #status-dot.connected { background: var(--success); }
    #status-dot.streaming { background: var(--accent); animation: pulse 0.5s infinite alternate; }
    @keyframes pulse { from { opacity: 1; } to { opacity: 0.3; } }
    #model-label { color: var(--muted); }
    
    #chat { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
    
    .msg { max-width: 760px; margin: 0 auto 16px; display: flex; gap: 12px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { flex-direction: row-reverse; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; font-weight: 600; }
    .msg.user .avatar { background: var(--user-bg); color: #fff; }
    .msg.nexus .avatar { background: var(--nexus-bg); border: 1px solid var(--border); color: var(--accent); }
    .bubble { max-width: 85%; padding: 12px 16px; border-radius: 16px; line-height: 1.7; font-size: 14px; word-wrap: break-word; }
    .msg.user .bubble { background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
    .msg.nexus .bubble { background: var(--nexus-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    
    .bubble pre { background: #000; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 10px 0; font-size: 13px; line-height: 1.5; }
    .bubble code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .bubble pre code { background: none; padding: 0; }
    .bubble p { margin: 8px 0; }
    .bubble strong { font-weight: 600; }
    .bubble em { font-style: italic; }
    .bubble a { color: var(--accent); }
    .bubble ul, .bubble ol { margin: 8px 0; padding-left: 20px; }
    .bubble li { margin: 4px 0; }
    
    .citation { font-size: 12px; color: var(--muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .citation sup { color: var(--accent); cursor: pointer; margin-right: 8px; }
    
    .copy-btn { float: right; opacity: 0; font-size: 11px; color: var(--muted); background: none; border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; cursor: pointer; }
    .bubble:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--text); border-color: var(--accent); }
    
    #input-area { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--sidebar); }
    #msg-input { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; font-size: 14px; resize: none; outline: none; min-height: 48px; max-height: 200px; font-family: inherit; line-height: 1.5; }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }
    
    #controls { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    #controls .tools { display: flex; gap: 6px; flex-wrap: wrap; }
    .tool-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
    .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tool-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.1); }
    #send-btn { background: var(--accent); color: #000; border: none; padding: 8px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
    #send-btn:hover { opacity: 0.9; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    #empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
    #empty-state h2 { font-size: 28px; font-weight: 300; margin-bottom: 12px; color: var(--text); }
    #empty-state p { font-size: 14px; max-width: 400px; margin: 0 auto; line-height: 1.6; }
    #empty-state .shortcuts { margin-top: 30px; font-size: 12px; }
    #empty-state kbd { background: var(--bg); border: 1px solid var(--border); padding: 3px 8px; border-radius: 4px; font-family: monospace; }
    
    .typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
    .typing-indicator span { width: 8px; height: 8px; background: var(--muted); border-radius: 50%; animation: typing 1s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>NexusClaw</h1>
      <p>Your framework. Your rules.</p>
    </div>
    <button id="new-chat-btn">+ New Chat</button>
    <div id="sessions-list"></div>
  </div>
  
  <div id="main">
    <div id="header">
      <select id="provider-select">
        <option value="ollama">🖥️ Local (Ollama)</option>
        <option value="openai">🤖 OpenAI</option>
        <option value="anthropic">🧠 Anthropic</option>
        <option value="minimaxi">⚡ Minimaxi</option>
      </select>
      <select id="model-select">
        <option value="llama3.2">llama3.2</option>
      </select>
      <div class="header-right">
        <span id="model-label">Ready</span>
        <div id="status-dot"></div>
      </div>
    </div>
    
    <div id="chat">
      <div id="empty-state">
        <h2>NexusClaw OpenRoom</h2>
        <p>Ask anything. Search the web. Upload files. Run code. No restrictions.</p>
        <div class="shortcuts">
          <kbd>Ctrl</kbd>+<kbd>Enter</kbd> to send &nbsp;|&nbsp; <kbd>Enter</kbd> for new line
        </div>
      </div>
    </div>
    
    <div id="input-area">
      <textarea id="msg-input" placeholder="Ask anything... (Ctrl+Enter to send)" rows="1"></textarea>
      <div id="controls">
        <div class="tools">
          <button class="tool-btn" id="btn-file" title="Upload file">📎 File</button>
          <button class="tool-btn" id="btn-search" title="Web search">🔍 Search</button>
          <button class="tool-btn" id="btn-voice" title="Voice input">🎤 Voice</button>
          <button class="tool-btn" id="btn-code" title="Code execution">💻 Code</button>
        </div>
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>

<script>
const API_BASE = "http://localhost:8080";
const WS_URL = `${API_BASE.replace('http://','ws://')}/ws/main`;
const PROVIDER_MODELS = {
  ollama: ["llama3.2", "llama3.1", "mistral", "codellama", "qwen2.5"],
  openai: ["gpt-4o", "gpt-4o-mini", "o1-preview", "o1-mini"],
  anthropic: ["claude-sonnet-4-20250514", "claude-3-5-sonnet-20241022", "claude-3-5-haiku-20241022"],
  minimaxi: ["MiniMax-M2.7-highspeed", "abab6.5s-chat"]
};

let sessionId = localStorage.getItem("nexus_session") || "main";
let ws = null;
let msgHistory = [];
let webSearch = false;
let voiceActive = false;
let currentStreamController = null;

// UI Elements
const chat = document.getElementById("chat");
const empty = document.getElementById("empty-state");
const input = document.getElementById("msg-input");
const sendBtn = document.getElementById("send-btn");
const statusDot = document.getElementById("status-dot");
const modelLabel = document.getElementById("model-label");

// Init
document.getElementById("provider-select").addEventListener("change", e => {
  const p = e.target.value;
  const sel = document.getElementById("model-select");
  sel.innerHTML = PROVIDER_MODELS[p].map(m => `<option value="${m}">${m}</option>`).join("");
  modelLabel.textContent = p === "ollama" ? "Local" : p;
  connectWS();
});

// WebSocket
function connectWS() {
  if (ws) ws.close();
  try {
    ws = new WebSocket(WS_URL);
    ws.onopen = () => {
      statusDot.className = "connected";
      modelLabel.textContent = "Connected";
    };
    ws.onmessage = e => {
      const data = JSON.parse(e.data);
      if (data.type === "chunk") appendChunk(data.content);
      else if (data.type === "done") finishStream();
      else if (data.type === "error") showError(data.content);
    };
    ws.onclose = () => { statusDot.className = ""; modelLabel.textContent = "Disconnected"; };
    ws.onerror = () => { statusDot.className = ""; modelLabel.textContent = "Error"; };
  } catch(e) { modelLabel.textContent = "API offline"; }
}

function sendWS(payload) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(payload));
    return true;
  }
  return false;
}

// Connect on load
connectWS();

// Send message
async function sendMsg() {
  const text = input.value.trim();
  if (!text) return;
  
  input.value = "";
  input.style.height = "auto";
  msgHistory.push({ role: "user", content: text });
  addMsg("user", text);
  empty.style.display = "none";
  
  const provider = document.getElementById("provider-select").value;
  const model = document.getElementById("model-select").value;
  
  // Add streaming indicator
  const msgDiv = addMsg("nexus", '<div class="typing-indicator"><span></span><span></span><span></span></div>');
  statusDot.className = "streaming";
  sendBtn.disabled = true;
  
  // Try WebSocket first, then HTTP
  if (!sendWS({ type: "chat", content: text, provider, model })) {
    // Fallback: HTTP streaming
    await httpStream(text, provider, model, msgDiv);
  }
}

async function httpStream(text, provider, model, msgDiv) {
  try {
    const res = await fetch(`${API_BASE}/v1/chat/answer/stream`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId, message: text, provider, model })
    });
    
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let full = "";
    
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const text = decoder.decode(value);
      const lines = text.split("\n");
      for (const line of lines) {
        if (line.startsWith("data: ")) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.type === "chunk") {
              full += data.content;
              updateMsg(msgDiv, full);
            } else if (data.type === "done" || data.type === "error") {
              break;
            }
          } catch {}
        }
      }
    }
    
    finishStream();
    msgHistory.push({ role: "assistant", content: full });
  } catch(e) {
    updateMsg(msgDiv, `[Error: ${e.message}]`);
    finishStream();
  }
}

// Message DOM helpers
function addMsg(role, content) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="avatar">${role === "user" ? "👤" : "🤖"}</div><div class="bubble">${content}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function updateMsg(div, content) {
  const bubble = div.querySelector(".bubble");
  bubble.innerHTML = format(content);
  chat.scrollTop = chat.scrollHeight;
}

function appendChunk(text) {
  let nexusDiv = chat.querySelector(".msg.nexus:last-child");
  if (!nexusDiv) {
    nexusDiv = addMsg("nexus", "");
  }
  const bubble = nexusDiv.querySelector(".bubble");
  bubble.innerHTML = format(bubble.dataset.raw || "");
  bubble.dataset.raw = (bubble.dataset.raw || "") + text;
  bubble.innerHTML = format(bubble.dataset.raw);
  chat.scrollTop = chat.scrollHeight;
}

function finishStream() {
  statusDot.className = "connected";
  sendBtn.disabled = false;
}

function showError(msg) {
  let nexusDiv = chat.querySelector(".msg.nexus:last-child");
  if (nexusDiv) {
    const bubble = nexusDiv.querySelector(".bubble");
    bubble.innerHTML = `<span style="color:#f85149">Error: ${msg}</span>`;
  }
  finishStream();
}

function format(text) {
  if (!text) return "";
  // Escape HTML
  text = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // Code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><button class="copy-btn" onclick="copyCode(this)">copy</button><code class="lang-${lang}">${code.trim()}</code></pre>`);
  // Inline code
  text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
  // Bold
  text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  // Italic
  text = text.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Citations
  text = text.replace(/\[\^(\d+)\]/g, '<sup>[$1]</sup>');
  // Line breaks
  text = text.replace(/\n/g, "<br>");
  return text;
}

function copyCode(btn) {
  const code = btn.nextElementSibling.textContent;
  navigator.clipboard.writeText(code);
  btn.textContent = "copied!";
  setTimeout(() => btn.textContent = "copy", 1500);
}

// Event listeners
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); sendMsg(); }
  if (e.key === "Enter" && !e.shiftKey && !e.ctrlKey) { e.preventDefault(); sendMsg(); }
});

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 200) + "px";
});

sendBtn.addEventListener("click", sendMsg);

// Tool buttons
document.getElementById("btn-file").addEventListener("click", () => {
  const input = document.createElement("input");
  input.type = "file";
  input.multiple = true;
  input.onchange = () => {
    for (const file of input.files) {
      const formData = new FormData();
      formData.append("file", file);
      fetch(`${API_BASE}/v1/files/upload`, { method: "POST", body: formData })
        .then(r => r.json())
        .then(d => addMsg("nexus", `📎 Uploaded: <strong>${file.name}</strong> — ${d.fileId ? `ID: ${d.fileId} (indexing...)` : "failed"}`))
        .catch(e => addMsg("nexus", `Upload error: ${e.message}`));
    }
  };
  input.click();
});

document.getElementById("btn-search").addEventListener("click", e => {
  webSearch = !webSearch;
  e.target.classList.toggle("active", webSearch);
  if (webSearch) input.placeholder = "Search the web... (Ctrl+Enter)";
  else input.placeholder = "Ask anything... (Ctrl+Enter to send)";
});

document.getElementById("btn-voice").addEventListener("click", e => {
  if (!voiceActive) {
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.onresult = ev => { input.value += " " + ev.results[0][0].transcript; };
    rec.onerror = () => voiceActive = false;
    rec.start();
    voiceActive = true;
    e.target.classList.add("active");
  } else {
    rec?.stop();
    voiceActive = false;
    e.target.classList.remove("active");
  }
});

document.getElementById("btn-code").addEventListener("click", () => {
  const code = prompt("Enter code to execute:");
  if (code) addMsg("nexus", `💻 Code execution is a Pro feature. Current response:<br><br><pre><code>${code}</code></pre>`);
});

document.getElementById("new-chat-btn").addEventListener("click", () => {
  msgHistory = [];
  chat.querySelectorAll(".msg").forEach(m => m.remove());
  empty.style.display = "block";
});
</script>
</body>
</html>
