<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>OpenRoom — NexusClaw</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0a0f; --surface: #12121a; --border: #2a2a3a;
  --text: #e0e0e0; --muted: #666; --accent: #7c6aef;
  --accent2: #a78bfa; --success: #22c55e; --danger: #ef4444;
  --warning: #eab308; --code-bg: #0d0d14;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

/* Header */
.header { display:flex; align-items:center; padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--border); gap:12px; }
.header .logo { font-weight:700; font-size:18px; color:var(--accent); }
.header .title { flex:1; font-size:14px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.header .controls { display:flex; gap:8px; }
.icon-btn { background:var(--bg); border:1px solid var(--border); color:var(--muted); width:36px; height:36px; border-radius:8px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
.icon-btn:hover { background:var(--border); color:var(--text); }

/* Messages */
.messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth; }
.msg { max-width:85%; padding:12px 16px; border-radius:16px; line-height:1.5; font-size:15px; word-break:break-word; }
.msg.user { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
.msg.assistant { align-self:flex-start; background:var(--surface); border:1px solid var(--border); border-bottom-left-radius:4px; }
.msg.system { align-self:center; background:transparent; color:var(--muted); font-size:12px; border:none; text-align:center; }
.msg pre { background:var(--code-bg); border-radius:8px; padding:12px; margin:8px 0; overflow-x:auto; font-family:var(--mono); font-size:13px; }
.msg code { background:var(--code-bg); padding:2px 6px; border-radius:4px; font-family:var(--mono); font-size:13px; }
.msg pre code { background:none; padding:0; }
.msg .meta { font-size:11px; color:var(--muted); margin-top:4px; }
.msg streaming { opacity:0.8; }

/* Voice indicator */
.voice-btn { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.speaking .voice-btn { background:var(--success); color:#fff; border-color:var(--success); }

/* Input area */
.input-area { padding:12px 16px; background:var(--surface); border-top:1px solid var(--border); }
.input-row { display:flex; gap:8px; align-items:flex-end; }
#input { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:12px; font-size:15px; font-family:var(--font); resize:none; max-height:120px; outline:none; }
#input:focus { border-color:var(--accent); }
#input::placeholder { color:var(--muted); }
.send-btn { background:var(--accent); border:none; color:#fff; width:44px; height:44px; border-radius:12px; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.send-btn:hover { background:var(--accent2); }
.send-btn:disabled { opacity:0.5; cursor:not-allowed; }

/* Attachments */
.attach-bar { display:flex; gap:8px; padding:8px 0; flex-wrap:wrap; }
.attach-chip { background:var(--bg); border:1px solid var(--border); padding:4px 10px; border-radius:20px; font-size:12px; color:var(--muted); display:flex; align-items:center; gap:4px; }
.attach-chip .remove { cursor:pointer; color:var(--danger); }

/* Settings panel */
.panel { position:fixed; top:0; right:0; bottom:0; width:min(360px, 90vw); background:var(--surface); border-left:1px solid var(--border); z-index:100; transform:translateX(100%); transition:transform 0.3s ease; overflow-y:auto; }
.panel.open { transform:translateX(0); }
.panel-header { display:flex; justify-content:space-between; align-items:center; padding:16px; border-bottom:1px solid var(--border); }
.panel-header h2 { font-size:16px; }
.panel-body { padding:16px; }
.setting { margin-bottom:20px; }
.setting label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
.setting select, .setting input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:8px; font-size:14px; outline:none; }
.setting select:focus, .setting input:focus { border-color:var(--accent); }

/* Loading */
.loading { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13px; padding:8px 0; }
.loading::before { content:''; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* Mobile */
@media (max-width:600px) {
  .msg { max-width:92%; font-size:14px; }
  .header .title { font-size:13px; }
  .header { padding:10px 12px; }
  .messages { padding:12px; }
  .input-area { padding:10px 12px; }
}

/* Overlay */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:99; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.overlay.visible { opacity:1; pointer-events:all; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">⚡</div>
  <div class="title" id="sessionTitle">OpenRoom</div>
  <div class="controls">
    <button class="icon-btn" onclick="clearChat()" title="New chat">✕</button>
    <button class="icon-btn" onclick="togglePanel()" title="Settings">⚙</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="msg system">⚡ NexusClaw OpenRoom — connected to local AI</div>
</div>

<div class="input-area">
  <div class="attach-bar" id="attachBar"></div>
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Message..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="togglePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <h2>⚙ Settings</h2>
    <button class="icon-btn" onclick="togglePanel()">✕</button>
  </div>
  <div class="panel-body">
    <div class="setting">
      <label>Provider</label>
      <select id="provider" onchange="saveSettings()">
        <option value="ollama">Ollama (local)</option>
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="minimaxi">Minimaxi</option>
      </select>
    </div>
    <div class="setting">
      <label>Model</label>
      <input id="model" value="llama3.2" onchange="saveSettings()">
    </div>
    <div class="setting">
      <label>Temperature</label>
      <input id="temp" type="range" min="0" max="2" step="0.1" value="0.7" oninput="document.getElementById('tempVal').textContent=this.value"> 
      <span id="tempVal" style="color:var(--accent);font-size:12px">0.7</span>
    </div>
    <div class="setting">
      <label>Soul / Persona</label>
      <select id="soul" onchange="saveSettings()">
        <option value="">Default</option>
        <option value="blank">Blank</option>
        <option value="assistant">Assistant</option>
        <option value="coder">Coder</option>
        <option value="researcher">Researcher</option>
      </select>
    </div>
    <div class="setting">
      <label>Max Response Length</label>
      <input id="maxTokens" type="range" min="256" max="8192" step="256" value="4096" oninput="document.getElementById('maxTokensVal').textContent=this.value">
      <span id="maxTokensVal" style="color:var(--accent);font-size:12px">4096</span>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8080';
let sessionId = localStorage.getItem('session_id') || 'main';
let streaming = false;
let controller = null;
let settings = JSON.parse(localStorage.getItem('nexus_settings') || '{}');

function loadSettings() {
  ['provider','model','soul','temp','maxTokens'].forEach(k => {
    const el = document.getElementById(k);
    if (el) el.value = settings[k] || el.value;
  });
}
function saveSettings() {
  ['provider','model','soul','temp','maxTokens'].forEach(k => {
    settings[k] = document.getElementById(k)?.value || '';
  });
  localStorage.setItem('nexus_settings', JSON.stringify(settings));
}
loadSettings();

// WebSocket streaming
function streamChat(message) {
  const ws = new WebSocket(`ws://localhost:8080/ws/${sessionId}`);
  streaming = true;
  
  ws.onopen = () => {
    ws.send(JSON.stringify({type:'chat', content:message, provider:settings.provider||'ollama', model:settings.model||'llama3.2'}));
  };
  
  const assistantDiv = addMessage('assistant', '');
  
  ws.onmessage = e => {
    const data = JSON.parse(e.data);
    if (data.type === 'chunk') {
      assistantDiv.querySelector('.content').textContent += data.content;
      assistantDiv.querySelector('.content').scrollIntoView();
    } else if (data.type === 'done') {
      streaming = false;
      ws.close();
    } else if (data.type === 'error') {
      assistantDiv.querySelector('.content').textContent = 'Error: ' + data.message;
      streaming = false;
    }
  };
  
  ws.onerror = () => {
    // Fallback to HTTP
    httpStream(message, assistantDiv);
  };
  
  ws.onclose = () => { if(streaming) httpStream(message, assistantDiv); };
}

async function httpStream(message, targetDiv) {
  streaming = true;
  const content = targetDiv.querySelector('.content');
  
  try {
    const resp = await fetch(`${API}/v1/chat/answer/stream`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({sessionId, message, provider:settings.provider||'ollama', model:settings.model||'llama3.2'})
    });
    
    if (!resp.ok) { content.textContent = 'API error: ' + resp.status; streaming=false; return; }
    
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      const text = decoder.decode(value, {stream:true});
      for (const line of text.split('\n')) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.type === 'chunk') {
              content.textContent += data.content;
              content.scrollIntoView();
            }
          } catch {}
        }
      }
    }
  } catch(e) {
    content.textContent = 'Connection failed. Is the API running?';
  }
  streaming = false;
}

function addMessage(role, content, meta='') {
  const div = document.createElement('div');
  div.className = `msg ${role}${streaming && role==='assistant'?' streaming':''}`;
  div.innerHTML = `<div class="content">${escapeHtml(content)}</div>${meta?`<div class="meta">${meta}</div>`:''}`;
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
  return div;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML.replace(/\n/g,'<br>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/```[\s\S]*?```/g,m=>'<pre><code>'+m.slice(3,-3).replace(/</g,'&lt;')+'</code></pre>');
}

async function sendMessage() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg || streaming) return;
  
  addMessage('user', msg);
  input.value = '';
  input.style.height = 'auto';
  
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'loading';
  loadingDiv.textContent = 'Thinking...';
  document.getElementById('messages').appendChild(loadingDiv);
  
  streamChat(msg);
  
  loadingDiv.remove();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function clearChat() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="msg system">⚡ New conversation</div>';
  sessionId = 'main_' + Date.now();
  localStorage.setItem('session_id', sessionId);
}

function togglePanel() {
  const panel = document.getElementById('panel');
  const overlay = document.getElementById('overlay');
  panel.classList.toggle('open');
  overlay.classList.toggle('visible');
}

// Init
fetch(`${API}/v1/chat/sessions`).then(r => r.json()).then(sessions => {
  const existing = sessions.find(s => s.id === sessionId);
  if (!existing) {
    fetch(`${API}/v1/chat/sessions`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({title:'OpenRoom'})})
      .then(r => r.json()).then(s => { sessionId = s.id; localStorage.setItem('session_id', sessionId); });
  }
}).catch(() => {});

// Voice input
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const sr = new SR();
  sr.lang = 'en-US';
  sr.onresult = e => { document.getElementById('input').value = e.results[0][0].transcript; };
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'm') { e.preventDefault(); sr.start(); }
  });
}
</script>
</body>
</html>
