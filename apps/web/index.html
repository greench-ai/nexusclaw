<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusClaw OpenRoom</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #07070d;
  --surface: #0f0f18;
  --surface2: #16161f;
  --border: #1e1e2e;
  --border2: #2a2a3e;
  --text: #e4e4ef;
  --text2: #8888a0;
  --accent: #8b7cf6;
  --accent-dim: rgba(139,124,246,0.15);
  --accent-glow: rgba(139,124,246,0.3);
  --success: #4ade80;
  --danger: #f87171;
  --warning: #fbbf24;
  --code-bg: #0a0a12;
  --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --mono: 'Cascadia Code', 'JetBrains Mono', 'SF Mono', monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* === HEADER === */
.header {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 16px;
  flex-shrink: 0;
  -webkit-app-region: drag;
}

.header .logo {
  font-size: 22px;
  -webkit-app-region: no-drag;
}

.header .title-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 15px;
  font-family: var(--font);
  outline: none;
  -webkit-app-region: no-drag;
}

.header .title-input::placeholder {
  color: var(--text2);
}

.header-actions {
  display: flex;
  gap: 6px;
  -webkit-app-region: no-drag;
}

.icon-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  width: 34px;
  height: 34px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.icon-btn:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--border2);
}

.icon-btn.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: var(--accent);
}

/* === MESSAGES === */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar {
  width: 6px;
}
.messages::-webkit-scrollbar-track {
  background: transparent;
}
.messages::-webkit-scrollbar-thumb {
  background: var(--border2);
  border-radius: 3px;
}

.msg {
  max-width: 780px;
  width: 100%;
  animation: msgIn 0.2s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user {
  align-self: flex-end;
}

.msg.user .bubble {
  background: var(--accent);
  color: #fff;
  border-radius: 18px 18px 4px 18px;
  padding: 12px 16px;
  font-size: 15px;
  line-height: 1.55;
  word-break: break-word;
}

.msg.assistant {
  align-self: flex-start;
}

.msg.assistant .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px 18px 18px 18px;
  padding: 14px 18px;
  font-size: 15px;
  line-height: 1.6;
  color: var(--text);
}

.msg.assistant .bubble p { margin-bottom: 10px; }
.msg.assistant .bubble p:last-child { margin-bottom: 0; }

.msg.assistant .bubble pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin: 10px 0;
  overflow-x: auto;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.5;
}

.msg.assistant .bubble code {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--accent);
}

.msg.assistant .bubble pre code {
  background: none;
  padding: 0;
  color: var(--text);
}

.msg .meta {
  font-size: 11px;
  color: var(--text2);
  margin-top: 6px;
  padding: 0 4px;
}

.msg.user .meta {
  text-align: right;
}

/* === INPUT AREA === */
.input-area {
  padding: 14px 20px 18px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-wrapper {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px 8px 8px 16px;
  transition: border-color 0.2s;
}

.input-wrapper:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

#input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 15px;
  font-family: var(--font);
  resize: none;
  max-height: 120px;
  outline: none;
  line-height: 1.5;
  padding: 4px 0;
}

#input::placeholder {
  color: var(--text2);
}

.send-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  width: 40px;
  height: 40px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}

.send-btn:hover:not(:disabled) {
  background: #7a6cf0;
  transform: scale(1.05);
}

.send-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* === SETTINGS PANEL === */
.panel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 340px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 100;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel.open {
  transform: translateX(0);
}

.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-header h2 {
  font-size: 15px;
  font-weight: 600;
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.setting {
  margin-bottom: 24px;
}

.setting label {
  display: block;
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.setting select,
.setting input[type="text"],
.setting input[type="number"] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.2s;
}

.setting select:focus,
.setting input:focus {
  border-color: var(--accent);
}

.setting select option {
  background: var(--surface2);
}

/* Status indicator */
.status-bar {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 11px;
  color: var(--text2);
  flex-shrink: 0;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 5px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.dot-green { background: var(--success); }
.dot-yellow { background: var(--warning); }
.dot-red { background: var(--danger); }
.dot-grey { background: var(--text2); }

/* Overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}

.overlay.visible {
  opacity: 1;
  pointer-events: all;
}

/* Loading indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 4px 0;
}

.typing-indicator span {
  width: 7px;
  height: 7px;
  background: var(--text2);
  border-radius: 50%;
  animation: typing 1.2s infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1); }
}

/* Mobile */
@media (max-width: 640px) {
  .header { padding: 10px 14px; }
  .messages { padding: 14px; }
  .input-area { padding: 10px 14px 14px; }
  .panel { width: 100%; }
  .msg.assistant .bubble { padding: 12px 14px; font-size: 14px; }
  .msg.user .bubble { padding: 10px 14px; font-size: 14px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">⚡</div>
  <input class="title-input" id="sessionTitle" value="NexusClaw Chat" placeholder="Chat title..." />
  <div class="header-actions">
    <button class="icon-btn" onclick="clearChat()" title="New chat">➕</button>
    <button class="icon-btn" onclick="toggleSettings()" title="Settings" id="settingsBtn">⚙️</button>
  </div>
</div>

<!-- Messages -->
<div class="messages" id="messages">
  <div class="msg assistant">
    <div class="bubble">
      <p>⚡ <strong>NexusClaw OpenRoom</strong></p>
      <p>Your framework. Your rules.</p>
      <p>Configure your AI provider below (⚙️), then send a message to get started.</p>
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-wrapper">
    <textarea id="input" rows="1" placeholder="Message..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

<!-- Status bar -->
<div class="status-bar">
  <div class="status-item">
    <span class="status-dot dot-grey" id="apiDot"></span>
    <span id="apiStatus">Checking API...</span>
  </div>
  <div class="status-item">
    <span class="status-dot dot-grey" id="ollamaDot"></span>
    <span id="ollamaStatus">Ollama...</span>
  </div>
  <div style="flex:1"></div>
  <div class="status-item" id="modelStatus">—</div>
</div>

<!-- Settings panel -->
<div class="overlay" id="overlay" onclick="toggleSettings()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <h2>⚙️ Settings</h2>
    <button class="icon-btn" onclick="toggleSettings()">✕</button>
  </div>
  <div class="panel-body">
    <div class="setting">
      <label>AI Provider</label>
      <select id="provider" onchange="saveSettings()">
        <option value="ollama">🤖 Ollama (local, free)</option>
        <option value="openai">✨ OpenAI (GPT-4o)</option>
        <option value="anthropic">🧠 Anthropic (Claude)</option>
        <option value="minimaxi">⚡ Minimaxi (fast, cheap)</option>
        <option value="openrouter">🌐 OpenRouter (100+ models)</option>
      </select>
    </div>
    <div class="setting">
      <label>Model</label>
      <input type="text" id="model" value="llama3.2" placeholder="e.g. llama3.2, gpt-4o" onchange="saveSettings()" />
    </div>
    <div class="setting">
      <label>Soul / Persona</label>
      <select id="soul" onchange="saveSettings()">
        <option value="">Default</option>
        <option value="blank">Blank — pure assistant</option>
        <option value="assistant">Assistant — helpful & friendly</option>
        <option value="coder">Coder — programming expert</option>
        <option value="researcher">Researcher — deep analysis</option>
      </select>
    </div>
    <div class="setting">
      <label>Temperature</label>
      <input type="range" id="temp" min="0" max="2" step="0.1" value="0.7" oninput="document.getElementById('tempVal').textContent=this.value; saveSettings()" />
      <div id="tempVal" style="color:var(--accent);font-size:12px;margin-top:4px">0.7</div>
    </div>
    <div class="setting">
      <label>Max Response Tokens</label>
      <input type="number" id="maxTokens" value="4096" min="256" max="8192" step="256" onchange="saveSettings()" />
    </div>
  </div>
</div>

<script>
const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;
const API_URL = 'http://localhost:8080';
const PORT = 19789;

let sessionId = localStorage.getItem('nexus_session') || 'main';
let ws = null;
let streaming = false;
let reconnectTimer = null;

let settings = JSON.parse(localStorage.getItem('nexus_settings') || '{}');

function loadSettings() {
  if (!settings.provider) settings = {provider: 'ollama', model: 'llama3.2', soul: '', temp: 0.7, maxTokens: 4096};
  document.getElementById('provider').value = settings.provider || 'ollama';
  document.getElementById('model').value = settings.model || 'llama3.2';
  document.getElementById('soul').value = settings.soul || '';
  document.getElementById('temp').value = settings.temp || 0.7;
  document.getElementById('tempVal').textContent = settings.temp || 0.7;
  document.getElementById('maxTokens').value = settings.maxTokens || 4096;
  updateModelStatus();
}
function saveSettings() {
  settings.provider = document.getElementById('provider').value;
  settings.model = document.getElementById('model').value;
  settings.soul = document.getElementById('soul').value;
  settings.temp = parseFloat(document.getElementById('temp').value);
  settings.maxTokens = parseInt(document.getElementById('maxTokens').value);
  localStorage.setItem('nexus_settings', JSON.stringify(settings));
  updateModelStatus();
  updateSession();
}
function updateModelStatus() {
  const m = document.getElementById('modelStatus');
  if (m) m.textContent = `${settings.provider}/${settings.model}`;
}

loadSettings();

// === WEBSOCKET ===
function connectWS() {
  if (ws && ws.readyState <= 1) return;
  
  ws = new WebSocket(`${WS_URL}/ws/${sessionId}`);
  
  ws.onopen = () => {
    setStatus('api', 'online', 'green');
    clearTimeout(reconnectTimer);
  };
  
  ws.onclose = () => {
    setStatus('api', 'reconnecting...', 'yellow');
    reconnectTimer = setTimeout(connectWS, 3000);
  };
  
  ws.onerror = () => {
    setStatus('api', 'offline', 'red');
  };
  
  ws.onmessage = e => {
    const data = JSON.parse(e.data);
    if (data.type === 'chunk') {
      streaming = true;
      const last = document.querySelector('.msg.assistant:last-child .bubble');
      if (last) {
        last.innerHTML = formatContent(data.content);
      }
    } else if (data.type === 'done') {
      streaming = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('sendBtn').textContent = '↑';
    } else if (data.type === 'error') {
      streaming = false;
      const last = document.querySelector('.msg.assistant:last-child .bubble');
      if (last) last.innerHTML = `<p style="color:var(--danger)">Error: ${data.content}</p>`;
      document.getElementById('sendBtn').disabled = false;
    }
  };
}

function setStatus(which, text, color) {
  const dot = document.getElementById(which + 'Dot');
  const txt = document.getElementById(which + 'Status');
  if (dot) dot.className = 'status-dot dot-' + color;
  if (txt) txt.textContent = text;
}

function updateSession() {
  // Notify backend of settings change
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({type: 'settings', settings}));
  }
}

// === CHAT ===
async function sendMessage() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg || streaming) return;
  
  addMessage('user', msg);
  input.value = '';
  input.style.height = 'auto';
  
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('sendBtn').textContent = '⟳';
  
  // Add empty assistant message
  addMessage('assistant', '<div class="typing-indicator"><span></span><span></span><span></span></div>');
  scrollBottom();
  
  // Ensure connected
  if (!ws || ws.readyState > 1) connectWS();
  
  if (ws.readyState === 1) {
    ws.send(JSON.stringify({
      type: 'chat',
      content: msg,
      provider: settings.provider,
      model: settings.model,
      soul: settings.soul,
      temperature: settings.temp,
      maxTokens: settings.maxTokens,
    }));
  } else {
    // Fallback to HTTP
    await httpStream(msg);
  }
}

async function httpStream(message) {
  const container = document.querySelector('.msg.assistant:last-child .bubble');
  
  try {
    const resp = await fetch(`${API_URL}/v1/chat/answer/stream`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        sessionId,
        message,
        provider: settings.provider,
        model: settings.model,
      })
    });
    
    if (!resp.ok) {
      container.innerHTML = `<p style="color:var(--danger)">API error: ${resp.status}. Is the API running?</p>`;
      return;
    }
    
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      
      const text = decoder.decode(value, {stream: true});
      for (const line of text.split('\n')) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.type === 'chunk') {
              full += data.content;
              container.innerHTML = formatContent(full);
              scrollBottom();
            }
          } catch {}
        }
      }
    }
  } catch(e) {
    container.innerHTML = `<p style="color:var(--danger)">Connection failed: ${e.message}</p><p style="color:var(--text2);font-size:13px;margin-top:8px">Start the API: <code style="background:var(--code-bg);padding:2px 6px;border-radius:4px">python3 apps/api/main.py</code></p>`;
  }
  
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('sendBtn').textContent = '↑';
  streaming = false;
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  
  if (role === 'assistant') {
    div.innerHTML = `<div class="bubble">${content}</div><div class="meta">NexusClaw · just now</div>`;
  } else {
    div.innerHTML = `<div class="bubble">${escapeHtml(content)}</div><div class="meta">You · just now</div>`;
  }
  
  document.getElementById('messages').appendChild(div);
  scrollBottom();
  return div;
}

function formatContent(text) {
  // Escape first, then format
  let html = escapeHtml(text);
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Code blocks
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => 
    `<pre><code class="lang-${lang}">${code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`);
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function clearChat() {
  document.getElementById('messages').innerHTML = `
    <div class="msg assistant">
      <div class="bubble">
        <p>⚡ <strong>New conversation</strong></p>
        <p>Your framework. Your rules.</p>
      </div>
    </div>`;
  sessionId = 'main_' + Date.now().toString(36);
  localStorage.setItem('nexus_session', sessionId);
}

function toggleSettings() {
  const panel = document.getElementById('panel');
  const overlay = document.getElementById('overlay');
  const btn = document.getElementById('settingsBtn');
  panel.classList.toggle('open');
  overlay.classList.toggle('visible');
  btn.classList.toggle('active');
}

// === STATUS CHECK ===
async function checkStatus() {
  // API
  try {
    const r = await fetch(`${API_URL}/health`, {signal: AbortSignal.timeout(3000)});
    if (r.ok) {
      setStatus('api', 'API online', 'green');
    } else {
      setStatus('api', `API error ${r.status}`, 'red');
    }
  } catch {
    setStatus('api', 'API offline', 'red');
  }
  
  // Ollama
  try {
    const r = await fetch('http://localhost:11434/api/tags', {signal: AbortSignal.timeout(3000)});
    if (r.ok) {
      const d = await r.json();
      setStatus('ollama', `${d.models.length} models`, 'green');
    } else {
      setStatus('ollama', `Ollama error`, 'red');
    }
  } catch {
    setStatus('ollama', 'Ollama offline', 'red');
  }
}

// Init
connectWS();
checkStatus();
setInterval(checkStatus, 15000);

// Auto-focus input
document.getElementById('input').focus();

// ─── MACHINE ACCESS ────────────────────────────────────────────
async function lsDir() {
  const path = prompt("Directory path:", "/home/greench");
  if (!path) return;
  try {
    const resp = await fetch(`${API_URL}/v1/tools/ls?path=${encodeURIComponent(path)}`);
    const data = await resp.json();
    if (data.error) { alert(data.error); return; }
    const items = data.items || [];
    const listing = items.slice(0,50).map(i => `${i.type === 'dir' ? '📁' : '📄'} ${i.name}${i.size ? ' (' + Math.round(i.size/1024) + 'KB)' : ''}`).join('\n');
    alert(`${data.path}\n\n${listing || 'empty'}${items.length > 50 ? '\n...and ' + (items.length-50) + ' more' : ''}`);
  } catch(e) { alert('Error: ' + e.message); }
}

async function runShell() {
  const cmd = prompt("Shell command:");
  if (!cmd) return;
  try {
    const resp = await fetch(`${API_URL}/v1/tools/shell?command=${encodeURIComponent(cmd)}`, {method:'POST'});
    const data = await resp.json();
    alert('stdout:\n' + (data.stdout || '(empty)') + '\n\nstderr:\n' + (data.stderr || '(empty)') + '\n\nexit: ' + data.returncode);
  } catch(e) { alert('Error: ' + e.message); }
}

async function sysInfo() {
  try {
    const resp = await fetch(`${API_URL}/v1/tools/system`, {method:'POST'});
    const data = await resp.json();
    const s = data.system || {};
    alert(`OS: ${s.os}\nHost: ${s.hostname}\nCPU: ${s.cpu_percent}% (${s.cpu_count} cores)\nRAM: ${s.memory_used_gb}GB / ${s.memory_total_gb}GB (${s.memory_percent}%)\nDisk: ${s.disk_percent}%`);
  } catch(e) { alert('Error: ' + e.message); }
}

async function showProcs() {
  try {
    const resp = await fetch(`${API_URL}/v1/tools/system`, {method:'POST'});
    const data = await resp.json();
    const procs = (data.processes?.processes || []).slice(0, 20);
    const listing = procs.map(p => `PID ${p.pid}: ${p.name} (CPU:${p.cpu?.toFixed(1)}% MEM:${p.mem?.toFixed(1)}%)`).join('\n');
    alert('Top Processes:\n\n' + listing);
  } catch(e) { alert('Error: ' + e.message); }
}

// ─── BROWSER AUTOMATION ────────────────────────────────────────
async function browserNav() {
  const url = document.getElementById('browserUrl')?.value;
  if (!url) return;
  try {
    const resp = await fetch(`${API_URL}/v1/tools/browser/navigate?url=${encodeURIComponent(url)}`, {method:'POST'});
    const data = await resp.json();
    alert(data.ok ? `Loaded: ${data.title || url}` : 'Error: ' + (data.error || 'failed'));
  } catch(e) { alert('Error: ' + e.message); }
}

async function browserShot() {
  try {
    const resp = await fetch(`${API_URL}/v1/tools/browser/screenshot`, {method:'POST'});
    const data = await resp.json();
    alert(data.ok ? `Screenshot saved:\n${data.path}` : 'Error: ' + (data.error || 'failed'));
  } catch(e) { alert('Error: ' + e.message); }
}

async function browserClose() {
  try {
    await fetch(`${API_URL}/v1/tools/browser/close`, {method:'POST'});
    alert('Browser closed');
  } catch(e) { alert('Error: ' + e.message); }
}

</script>
