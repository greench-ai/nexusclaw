services:
  nexusclaw-api:
    build: .
    container_name: nexusclaw-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NEXUS_SECRET=${NEXUS_SECRET:-change-me-in-setup}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - QDRANT_URL=http://nexusclaw-qdrant:6333
    volumes:
      - ./config:/app/config
      - nexusclaw-data:/app/data
    depends_on:
      - nexusclaw-qdrant
    networks:
      - nexusclaw-net

  nexusclaw-web:
    build: .
    container_name: nexusclaw-web
    restart: unless-stopped
    command: python apps/web/server.py
    ports:
      - "19789:19789"
    environment:
      - NEXUS_API_URL=http://nexusclaw-api:8080
    depends_on:
      - nexusclaw-api
    networks:
      - nexusclaw-net

  nexusclaw-qdrant:
    image: qdrant/qdrant:latest
    container_name: nexusclaw-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - nexusclaw-net

volumes:
  nexusclaw-data:
  qdrant-data:

networks:
  nexusclaw-net:
    driver: bridge
