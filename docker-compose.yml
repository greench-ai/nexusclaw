version: "3.9"

services:
  nexusclaw:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: nexusclaw:latest
    container_name: nexusclaw
    restart: unless-stopped
    ports:
      - "14300:8000"
    volumes:
      - ~/.nexusclaw:/root/.nexusclaw
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_URL=http://172.29.192.1:11434
    extra_hosts:
      - host.docker.internal:host-gateway

  # Qdrant vector database (required for RAG)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nexusclaw-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/root/qdrant/storage

  # Ollama (optional local models)
  ollama:
    image: ollama/ollama:latest
    container_name: nexusclaw-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local-ollama

volumes:
  qdrant_data:
  ollama_data:
