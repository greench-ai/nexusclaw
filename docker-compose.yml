version: '3.8'
services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NEXUS_SECRET=change-me-in-production
      - OLLAMA_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
    depends_on:
      - qdrant
      - redis
      - ollama
    volumes:
      - ~/.nexusclaw:/root/.nexusclaw

  openroom:
    build: .
    command: python3 apps/web/server.py
    ports:
      - "51234:51234"
    environment:
      - NEXUS_API_URL=http://api:8080
    depends_on:
      - api

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all

volumes:
  ollama-data:
