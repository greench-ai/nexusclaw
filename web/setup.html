<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusClaw ⚡ — Setup</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300ff88'/><text y='70' x='50' text-anchor='middle' font-size='60' font-weight='bold' font-family='monospace'>⚡</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a; --surface-1: #111118; --surface-2: #1a1a24;
      --border: #1e1e28; --text: #f0f0f0; --text-2: #9090a0; --text-3: #505068;
      --green: #00ff88; --green-dim: rgba(0,255,136,0.1); --radius: 10px;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-body: 'Space Grotesk', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body); font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface-1); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    button { cursor: pointer; font-family: inherit; }
    input { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const API = "";

// ── Provider definitions ──────────────────────────────────────────────────────
const PROVIDERS = [
  {
    id: "ollama", label: "Ollama", desc: "Free local models — no API key needed",
    icon: "●", type: "local", base_url: "http://localhost:11434/v1",
    default_model: "llama3",
    models: ["llama3","llama3.2","mistral","codellama","qwen2.5"],
    hint: "Install from ollama.com first",
  },
  {
    id: "openrouter", label: "OpenRouter", desc: "100+ models — DeepSeek, Qwen, Gemma, Claude...",
    icon: "◎", type: "cloud", base_url: "https://openrouter.ai/api/v1",
    key_placeholder: "sk-or-v1-...", key_url: "openrouter.ai/keys",
    default_model: "deepseek/deepseek-chat-v3.1",
    models: ["deepseek/deepseek-chat-v3.1","qwen/qwen3-8b","qwen/qwen3-32b","google/gemma-3-27b-it","anthropic/claude-3-haiku","nvidia/nemotron-3-super-120b-a12b:free"],
    hint: "Best value: DeepSeek V3.1 — cheapest and most capable",
  },
  {
    id: "deepseek", label: "DeepSeek", desc: "Fast, cheap, excellent reasoning",
    icon: "◆", type: "cloud", base_url: "https://api.deepseek.com/v1",
    key_placeholder: "sk-...", key_url: "platform.deepseek.com/api_keys",
    default_model: "deepseek-chat",
    models: ["deepseek-chat","deepseek-coder"],
    hint: "deepseek-chat is the main all-purpose model",
  },
  {
    id: "groq", label: "Groq", desc: "Blazingly fast — free tier available",
    icon: "▲", type: "cloud", base_url: "https://api.groq.com/openai/v1",
    key_placeholder: "gsk_...", key_url: "console.groq.com/keys",
    default_model: "llama-3.1-70b-versatile",
    models: ["llama-3.1-70b-versatile","llama-3.1-8b-instant","mixtral-8x7b-32768"],
    hint: "Free tier — 14k tokens/min. Llama 3.1 70B is best quality",
  },
  {
    id: "dashscope", label: "DashScope", desc: "Alibaba Qwen series — powerful Chinese models",
    icon: "◈", type: "cloud", base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1",
    key_placeholder: "your Alibaba Access Key", key_url: "modelstudio.console.alibabacloud.com → Access Key",
    default_model: "qwen-plus",
    models: ["qwen-plus","qwen-turbo","qwen-max"],
    hint: "qwen-plus is the best all-round from DashScope",
  },
];

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  const p = PROVIDERS[0]; // default

  root.innerHTML = `
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
    <div style="width:100%;max-width:600px">
      <!-- Header -->
      <div style="text-align:center;margin-bottom:36px">
        <div style="font-size:34px;font-weight:700;color:var(--green);margin-bottom:6px;font-family:var(--font-mono)">⚡ NexusClaw</div>
        <div style="color:var(--text-2);font-size:15px">Your AI chat platform. Self-hosted. Private.</div>
      </div>

      <!-- Provider list -->
      <div style="margin-bottom:24px">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);margin-bottom:12px">Step 1 — Choose your provider</div>
        <div id="providers" style="display:flex;flex-direction:column;gap:8px"></div>
      </div>

      <!-- API Key -->
      <div id="key-section" style="margin-bottom:16px;display:none">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);margin-bottom:12px">Step 2 — Add your API key</div>
        <input id="api-key" type="password" placeholder="${p.key_placeholder}"
          style="width:100%;background:var(--surface-1);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:13px;font-family:var(--font-mono);outline:none" />
        <div id="key-url" style="font-size:11px;color:var(--text-3);margin-top:5px"></div>
      </div>

      <!-- Model -->
      <div id="model-section" style="margin-bottom:24px;display:none">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);margin-bottom:12px">Step 2/3 — Pick a model</div>
        <div id="model-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px"></div>
        <input id="model-input" type="text"
          style="width:100%;background:var(--surface-1);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:13px;font-family:var(--font-mono);outline:none" />
        <div id="model-hint" style="font-size:11px;color:var(--text-3);margin-top:5px"></div>
      </div>

      <!-- Error -->
      <div id="error-box" style="background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.25);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#ff6666;display:none"></div>
      <div id="done-box" style="background:var(--green-dim);border:1px solid rgba(0,255,136,0.2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--green);display:none">✓ Saved! Starting chat...</div>

      <!-- Save -->
      <button id="save-btn"
        style="width:100%;background:var(--green);color:#000;border:none;border-radius:8px;padding:15px;font-weight:700;font-size:15px;cursor:pointer">
        Save & Start Chatting →
      </button>

      <div style="font-size:11px;color:var(--text-3);text-align:center;margin-top:12px">
        Your key is stored locally in <code style="font-family:var(--font-mono)">~/.nexusclaw/config.yaml</code>
      </div>
    </div>
  </div>`;

  // Render providers
  const container = document.getElementById("providers");
  PROVIDERS.forEach((prov, idx) => {
    const btn = document.createElement("button");
    btn.style.cssText = `background:${idx===0?"rgba(0,255,136,0.06)":"var(--surface-1)"};border:1px solid ${idx===0?"var(--green)":"var(--border)"};border-radius:var(--radius);padding:14px 16px;text-align:left;color:var(--text);cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:all 0.15s`;
    btn.innerHTML = `<span style="font-size:18px;line-height:1;margin-top:1px;flex-shrink:0;color:${idx===0?"var(--green)":"var(--text-3)"}">${prov.icon}</span><div style="flex:1"><div style="font-weight:600;font-size:14px">${prov.label}</div><div style="font-size:12px;color:var(--text-2);margin-top:2px">${prov.desc}</div></div>${idx===0?'<span style="color:var(--green);font-size:18px;line-height:1;flex-shrink:0">✓</span>':""}`;
    btn.onclick = () => selectProvider(prov);
    container.appendChild(btn);
  });

  // Initial state: select first provider
  selectProvider(PROVIDERS[0]);

  // Save handler
  document.getElementById("save-btn").onclick = handleSave;
}

let selectedProvider = null;

function selectProvider(prov) {
  selectedProvider = prov;

  // Update provider buttons
  document.querySelectorAll("#providers button").forEach((btn, idx) => {
    if (!PROVIDERS[idx]) return;
    const isSelected = PROVIDERS[idx].id === prov.id;
    btn.style.background = isSelected ? "rgba(0,255,136,0.06)" : "var(--surface-1)";
    btn.style.borderColor = isSelected ? "var(--green)" : "var(--border)";
    btn.querySelector("span:first-child").style.color = isSelected ? "var(--green)" : "var(--text-3)";
    // Replace/check mark — only buttons with idx===0 have a last-child span
    const lastSpan = btn.querySelector("span:last-child");
    if (lastSpan) {
      if (isSelected && lastSpan.textContent !== "✓") {
        lastSpan.textContent = "✓";
        lastSpan.style.color = "var(--green)";
        lastSpan.style.fontSize = "18px";
      } else if (!isSelected && lastSpan.textContent === "✓") {
        lastSpan.textContent = "";
      }
    }
  });

  // Key section
  const keySection = document.getElementById("key-section");
  if (prov.type === "cloud") {
    keySection.style.display = "block";
    document.getElementById("api-key").placeholder = prov.key_placeholder;
    document.getElementById("key-url").innerHTML = `Get your key at <span style="color:var(--green)">${prov.key_url}</span>`;
  } else {
    keySection.style.display = "none";
  }

  // Model section
  const modelSection = document.getElementById("model-section");
  modelSection.style.display = "block";

  // Model chips
  const chips = document.getElementById("model-chips");
  chips.innerHTML = "";
  prov.models.forEach((m) => {
    const chip = document.createElement("button");
    chip.textContent = m;
    const isDefault = m === prov.default_model;
    chip.style.cssText = `padding:6px 12px;border-radius:6px;border:1px solid ${isDefault?"var(--green)":"var(--border)"};background:${isDefault?"var(--green-dim)":"transparent"};color:${isDefault?"var(--green)":"var(--text-2)"};font-size:12px;font-family:var(--font-mono);cursor:pointer`;
    chip.onclick = () => {
      document.getElementById("model-input").value = m;
      chips.querySelectorAll("button").forEach((c, i) => {
        const mm = prov.models[i];
        c.style.borderColor = mm === m ? "var(--green)" : "var(--border)";
        c.style.background = mm === m ? "var(--green-dim)" : "transparent";
        c.style.color = mm === m ? "var(--green)" : "var(--text-2)";
      });
    };
    chips.appendChild(chip);
  });

  // Model input
  document.getElementById("model-input").value = prov.default_model;
  document.getElementById("model-hint").textContent = prov.hint;

  // Reset error/done
  document.getElementById("error-box").style.display = "none";
  document.getElementById("done-box").style.display = "none";
  document.getElementById("save-btn").disabled = false;
  document.getElementById("save-btn").textContent = "Save & Start Chatting →";
}

async function handleSave() {
  const prov = selectedProvider;
  const apiKey = prov.type === "cloud" ? document.getElementById("api-key").value : "";
  const model = document.getElementById("model-input").value.trim();

  if (!model) return;
  if (prov.type === "cloud" && !apiKey) return;

  const btn = document.getElementById("save-btn");
  btn.disabled = true;
  btn.textContent = "Saving...";
  document.getElementById("error-box").style.display = "none";

  try {
    const r = await fetch(`${API}/api/v1/config/provider`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: prov.id,
        api_key: prov.type === "cloud" ? apiKey : null,
        base_url: prov.base_url,
        models: [model],
        enabled: true,
      }),
    });

    if (!r.ok) throw new Error(`Error ${r.status}`);

    document.getElementById("done-box").style.display = "block";
    btn.textContent = "✓ Saved!";
    setTimeout(() => { window.location.href = "/chat"; }, 1200);
  } catch (e) {
    document.getElementById("error-box").textContent = "✗ " + (e.message || "Something went wrong");
    document.getElementById("error-box").style.display = "block";
    btn.disabled = false;
    btn.textContent = "Save & Start Chatting →";
  }
}

render();
</script>
</body>
</html>
